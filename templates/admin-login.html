<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — MenuCraft</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0F1117 0%, #1E2235 100%);
      font-family: 'Nunito', sans-serif;
    }
    .login-box {
      background: #1E2235; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 44px 40px; width: 100%; max-width: 380px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .login-logo {
      font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700;
      color: #fff; text-align: center; margin-bottom: 6px;
    }
    .login-logo span { color: #E8712A; }
    .admin-tag {
      display: block; text-align: center; font-size: 0.68rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      color: #FCA5A5; margin-bottom: 32px;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 0.75rem; font-weight: 700;
      color: rgba(226,232,240,0.6); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .field input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #E2E8F0; font-family: 'Nunito', sans-serif;
      font-size: 0.92rem; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #E8712A; }
    .btn-login {
      width: 100%; padding: 13px; background: #E8712A; color: #fff; border: none;
      border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: all 0.25s; margin-top: 8px;
    }
    .btn-login:hover { background: #C45A18; }
    .btn-login:disabled { background: #555; cursor: not-allowed; }
    .error-msg {
      color: #FCA5A5; font-size: 0.82rem; text-align: center;
      margin-top: 12px; display: none;
    }
    .error-msg.show { display: block; }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      color: rgba(226,232,240,0.4); font-size: 0.8rem; text-decoration: none;
    }
    .back-link:hover { color: #E8712A; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Menu<span>Craft</span></div>
    <span class="admin-tag">⚡ Admin Access</span>

    <div class="field">
      <label>Username</label>
      <input type="text" id="adminUser" placeholder="Enter admin username" autocomplete="off" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password"
        onkeydown="if(event.key==='Enter') submitAdminLogin()" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="submitAdminLogin()">
      🔐 Login to Admin Panel
    </button>
    <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>
    <a href="/" class="back-link">← Back to website</a>
  </div>

  <script>
    async function submitAdminLogin() {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('errorMsg');
      if (!user || !pass) { err.classList.add('show'); err.textContent = 'Please enter username and password.'; return; }
      btn.disabled = true; btn.textContent = '⏳ Logging in...';
      err.classList.remove('show');
      try {
        const res  = await fetch('/api/admin/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
          window.location.reload(); // reload — Flask will now serve admin.html
        } else {
          err.textContent = data.message || 'Invalid credentials.';
          err.classList.add('show');
          btn.disabled = false; btn.textContent = '🔐 Login to Admin Panel';
        }
      } catch(e) {
        err.textContent = 'Could not connect to server.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = '🔐 Login to Admin Panel';
      }
    }
  </script>
</body>
</html>
